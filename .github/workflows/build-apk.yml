name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle assembleDebug --no-daemon 2>&1 | tee gradle-build.log
          exit ${PIPESTATUS[0]}
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
      - name: Commit build log on failure
        if: failure()
        shell: bash
        run: |
          cp gradle-build.log ci-build-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-build-log.txt
          git commit -m "Add CI build log [skip ci]"
          git push
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DistanceMeterLab-debug-apk
          path: app/build/outputs/apk/debug/*.apk
